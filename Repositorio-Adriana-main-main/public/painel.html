<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <title>Painel - Refúgio Literário</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header class="cabecalho">
      <div class="conteudo">
        <div class="header-left">
          <div class="logotipo">Biblioteca</div>
          <div id="user-status" class="user-status"></div>
        </div>
        <nav class="menu-navegacao">
          <ul class="lista-menu">
            <li><a href="index.html#inicio">Início</a></li>
            <li><a href="index.html#acervo">Acervo público</a></li>
            <li id="logout-menu-item">
              <a href="#" id="logout-btn" class="logout-link">Sair</a>
            </li>
          </ul>
        </nav>
      </div>
    </header>

    <main>
      <section class="secao-acervo" style="padding-top: 120px">
        <div class="conteudo">
          <h2>Gerenciar livros</h2>
          <p>Cadastre, edite e exclua livros da biblioteca.</p>

          <div class="painel-layout">
            <div class="painel-form">
              <h3>Livro</h3>
              <input type="hidden" id="livroId" />

              <label for="titulo">Título</label>
              <input type="text" id="titulo" placeholder="Digite o título" />

              <label for="autor">Autor</label>
              <input type="text" id="autor" placeholder="Digite o autor" />

              <label for="ano">Ano</label>
              <input
                type="number"
                id="ano"
                placeholder="Ano de publicação"
                min="0"
              />

              <label for="genero">Gênero</label>
              <input type="text" id="genero" placeholder="Ex: Romance, Fantasia" />

              <div class="painel-botoes">
                <button
                  type="button"
                  id="btnSalvarLivro"
                  class="botao-destaque"
                  onclick="cadastrarLivro()"
                >
                  Cadastrar livro
                </button>
                <button
                  type="button"
                  id="btnCancelarEdicao"
                  class="botao-secundario"
                  style="display: none"
                  onclick="cancelarEdicao()"
                >
                  Cancelar edição
                </button>
              </div>
            </div>

            <div class="tabela-container">
              <table class="tabela-livros">
                <thead>
                  <tr>
                    <th>ID</th>
                    <th>Título</th>
                    <th>Autor</th>
                    <th>Ano</th>
                    <th>Gênero</th>
                    <th>Ações</th>
                  </tr>
                </thead>
                <tbody id="tabelaDeLivro"></tbody>
              </table>
            </div>
          </div>
        </div>
      </section>
    </main>

    <footer class="rodape">
      <div class="conteudo">
        <p>&copy; 2026 Refúgio Literário.</p>
      </div>
    </footer>

    <script src="script.js"></script>
  </body>
</html>
